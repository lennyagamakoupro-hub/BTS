<!doctype html>
<html><head><meta charset="utf-8"><style>
  body{margin:0;background:#333;display:flex;gap:16px;padding:16px;font-family:sans-serif}
  .phone{width:390px;height:800px;border:0;background:#000;border-radius:8px;overflow:hidden;box-shadow:0 0 0 2px #555}
</style></head><body>
<iframe id="f" class="phone" src="index.html"></iframe>
<script>
  const f=document.getElementById('f');
  f.addEventListener('load',()=>{
    const tryDismiss=(n=0)=>{
      try{
        const d=f.contentWindow.document;
        const g=d.getElementById('lenny-gate');
        if(g){g.classList.add('hidden');g.style.display='none';}
        d.documentElement.style.overflow='';
      }catch(e){}
      if(n<20) setTimeout(()=>tryDismiss(n+1),200);
    };
    tryDismiss();
  });
</script>
</body></html>
